name: Build and Push to Quay.io

on:
  push:
    branches:
      - master
      - 'fix-*'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      dockerfile:
        description: 'Dockerfile to use'
        required: false
        default: 'k8s/Dockerfile.ubuntu'
        type: choice
        options:
          - k8s/Dockerfile.ubuntu
          - k8s/Dockerfile
      tag:
        description: 'Tag to use (default: auto-generated)'
        required: false

jobs:
  build-and-push-quay:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'arm64,amd64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set image metadata
        id: meta
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "latest")
          SHA_SHORT=$(git rev-parse --short=8 HEAD)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          BRANCH_NAME=${BRANCH_NAME//\//-}
          
          # Determine tag based on event or input
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/master" ]]; then
            TAG="master-${SHA_SHORT}"
          else
            TAG="${BRANCH_NAME}-${SHA_SHORT}"
          fi
          
          QUAY_REPO="${{ secrets.QUAY_REPOSITORY || 'wire/cassandra-medusa' }}"
          QUAY_IMAGE="quay.io/${QUAY_REPO}"
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "quay_image=${QUAY_IMAGE}" >> $GITHUB_OUTPUT

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          DOCKERFILE="${{ github.event.inputs.dockerfile || 'k8s/Dockerfile.ubuntu' }}"
          echo "dockerfile=${DOCKERFILE}" >> $GITHUB_OUTPUT
          echo "Using Dockerfile: ${DOCKERFILE}"

      - name: Set up Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1

      - name: Build Medusa
        run: |
          poetry install && poetry build

      - name: Build and push multi-arch image to Quay.io
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.quay_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.quay_image }}:${{ steps.meta.outputs.sha_short }}
            ${{ steps.meta.outputs.quay_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image information
        run: |
          echo "## Docker Images Built and Pushed to Quay.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ steps.meta.outputs.sha_short }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **Quay.io Image**: ${{ steps.meta.outputs.quay_image }}:${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
